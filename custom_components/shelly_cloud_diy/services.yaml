download_and_convert_history:
  name: Download and Convert History
  description: >-
    Downloads Shelly EM historical energy data from local gateway proxy,
    converts it to CSV format compatible with homeassistant-statistics
    HACS integration, and saves to config directory for import.
  fields:
    gateway_url:
      name: Gateway URL
      description: >-
        Base URL of local gateway that proxies to Shelly devices
        (e.g., https://myproxy.com/sensor). If not provided, uses the URL
        configured in integration options.
      required: false
      example: "https://silver.oldtownsultanahmet.com/sensor"
      selector:
        text:
    device_id:
      name: Device ID
      description: >-
        Optional Shelly Cloud device ID to convert. If not provided,
        converts data for all EM devices.
      required: false
      example: "80157669366571"
      selector:
        text:
